services:
  nessie:
    image: projectnessie/nessie:latest
    container_name: nessie
    ports:
      - '19120:19120'
    networks:
      - github-repo-tracker

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: minio
    ports:
      - '9000:9000'
      - '9001:9001'
    env_file:
      - .env
    volumes:
      - minio-data:/data
    command: ['server', '/data', '--console-address', ':9001']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    depends_on:
      - nessie
    networks:
      - github-repo-tracker

  minio-client:
    image: minio/mc
    container_name: mc
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 minioadmin minioadmin) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing minio/github-repo-tracker;
      /usr/bin/mc anonymous set download minio/github-repo-tracker;
      tail -f /dev/null
      "
    networks:
      - github-repo-tracker

volumes:
  minio-data:

networks:
  github-repo-tracker:
    external: true
